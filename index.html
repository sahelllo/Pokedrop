<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e3350d">
  <meta name="description" content="PokéDrop – Finde die neuesten Pokémon-Drops und Prospekt-Angebote der Märkte in deiner Umgebung.">
  <title>PokéDrop – Pokémon-Drops in deiner Nähe</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <span class="pokeball" aria-hidden="true"></span>
        <h1>PokéDrop</h1>
      </div>
      <button id="btn-refresh" class="icon-btn" title="Aktualisieren" aria-label="Aktualisieren">⟳</button>
    </div>
    <p class="tagline">Pokémon-Drops &amp; Prospekt-Angebote in deiner Umgebung</p>
  </header>

  <main>
    <!-- Standort & Umkreis -->
    <section class="panel location-panel">
      <div class="location-row">
        <div id="location-status" class="location-status">
          <span class="dot dot-off" id="location-dot"></span>
          <span id="location-text">Standort nicht aktiviert</span>
        </div>
        <button id="btn-locate" class="btn btn-primary">📍 Standort nutzen</button>
      </div>
      <div class="radius-row">
        <label for="radius">Umkreis: <strong id="radius-value">10 km</strong></label>
        <input type="range" id="radius" min="1" max="50" step="1" value="10">
      </div>
    </section>

    <!-- Filter -->
    <section class="panel filter-panel">
      <div class="filter-chips" id="chain-filters" role="group" aria-label="Nach Markt filtern">
        <!-- wird per JS befüllt -->
      </div>
      <div class="filter-toggles">
        <label class="toggle">
          <input type="checkbox" id="filter-available" checked>
          <span>Nur verfügbare Drops</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="filter-new">
          <span>Nur neue Drops</span>
        </label>
      </div>
    </section>

    <!-- Ergebnis-Liste -->
    <section id="results" class="results" aria-live="polite">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🔍</div>
        <p>Aktiviere deinen Standort, um Pokémon-Drops<br>in deiner Umgebung zu sehen.</p>
        <p class="hint">Ohne Standort werden Beispiel-Märkte angezeigt.</p>
        <button id="btn-demo" class="btn btn-secondary">Demo ohne Standort ansehen</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>⚠️ Demo-Version mit Beispieldaten – Prospekt-Anbindung folgt.</p>
    <p id="last-update"></p>
  </footer>

  <!-- Detail-Dialog für einen Drop -->
  <dialog id="drop-dialog">
    <div id="drop-dialog-content"></div>
    <button class="btn btn-secondary" id="btn-close-dialog">Schließen</button>
  </dialog>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
